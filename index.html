<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中医学习App - 成就版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#8B3A3A;--a:#D4AF37;--bg:#F5F1E8;--txt:#2C2C2C;--bd:#D4C5B9;--ok:#27ae60;--no:#c0392b}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:var(--bg);color:var(--txt);line-height:1.6}
.c{max-width:1200px;margin:0 auto;padding:15px}
header{text-align:center;padding:15px;border-bottom:3px solid var(--p);margin-bottom:10px;position:sticky;top:0;z-index:100;background:var(--bg)}
h1{font-size:1.4em;color:var(--p)}
.sub{color:var(--a);font-size:.8em}
.gbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center;justify-content:center;padding:8px;background:linear-gradient(135deg,var(--p),#6B2A2A);border-radius:8px;color:#fff;font-size:.8em}
.si{background:rgba(255,255,255,.15);padding:3px 8px;border-radius:12px}
.sv{color:var(--a);font-weight:700}
.lb{background:var(--a);color:var(--p);padding:1px 8px;border-radius:8px;font-weight:700}
.pb{width:100%;height:6px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden;margin-top:4px}
.pf{height:100%;background:linear-gradient(90deg,var(--a),#FFD700);transition:width .5s}
.tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}
.tabs button{padding:6px 10px;border:2px solid var(--p);background:#fff;color:var(--p);cursor:pointer;font-size:.82em;border-radius:4px;font-weight:700}
.tabs button.active{background:var(--p);color:#fff}
.sec{display:none}.sec.active{display:block}
.sbox{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.sbox input,.sbox select{padding:6px 8px;border:2px solid var(--bd);border-radius:4px;font-size:.85em;background:#fff;flex:1;min-width:110px}
.sbox button{padding:6px 10px;background:var(--p);color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:700;font-size:.8em}
.mf{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;justify-content:center}
.mb{padding:4px 7px;border:1px solid var(--bd);background:#fff;cursor:pointer;border-radius:10px;font-size:.75em}
.mb.active{background:var(--p);color:#fff;border-color:var(--p)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin-bottom:12px}
.card{background:#fff;border:2px solid var(--bd);border-radius:7px;padding:10px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--p),var(--a))}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 8px rgba(139,58,58,.15);border-color:var(--p)}
.mrd::before{background:linear-gradient(90deg,var(--a),#8B6914)}
.fn{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.8);border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:.9em}
.fn.hi{color:var(--no)}
.cname{font-size:1.05em;font-weight:700;color:var(--p);margin-bottom:3px;padding-right:30px}
.cloc,.cpy{color:var(--a);font-size:.78em;margin-bottom:5px;font-weight:700}
.cdet{font-size:.78em;margin-bottom:3px;line-height:1.4}
.cdet strong{color:var(--p)}
.qc{background:#fff;border:2px solid var(--bd);border-radius:7px;padding:15px;max-width:680px;margin:0 auto}
.qprog{margin-bottom:8px}
.qbar{background:#E8E4D8;border-radius:6px;overflow:hidden;height:20px}
.qfill{background:linear-gradient(90deg,var(--p),var(--a));height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75em;font-weight:700;min-width:35px}
.qstats{display:flex;justify-content:space-between;font-size:.8em;color:#666;margin-bottom:8px}
.qh{color:var(--p);margin-bottom:8px;font-size:.95em;background:rgba(139,58,58,.06);padding:8px;border-radius:4px}
.qopts{display:flex;flex-direction:column;gap:5px}
.qopt{padding:8px 10px;border:2px solid var(--bd);background:#fff;cursor:pointer;border-radius:4px;display:flex;align-items:center;transition:all .2s}
.qopt:hover{border-color:var(--p);background:rgba(139,58,58,.04)}
.qopt input{margin-right:7px;accent-color:var(--p)}
.qopt.ok{border-color:var(--ok);background:rgba(39,174,96,.08)}
.qopt.no{border-color:var(--no);background:rgba(192,57,43,.08)}
.qopt.dn{pointer-events:none;opacity:.7}
.qbtns{display:flex;gap:6px;margin-top:10px;justify-content:center}
.qbtns button{padding:7px 14px;border:none;border-radius:4px;cursor:pointer;font-weight:700;font-size:.85em}
.bn{background:var(--p);color:#fff}.bn:hover{background:#6B2A2A}
.br{background:#E8E4D8;color:var(--txt);border:2px solid var(--bd)}
.qres{border:2px solid var(--p);border-radius:7px;padding:12px;margin-top:10px;text-align:center;background:linear-gradient(135deg,rgba(139,58,58,.08),rgba(212,175,55,.08));display:none}
.rs{font-size:1.5em;color:var(--p);font-weight:700;margin-bottom:5px}
.qa-c{max-width:780px;margin:0 auto}
.qase{margin-bottom:8px}
.qase input{width:100%;padding:7px 10px;border:2px solid var(--bd);border-radius:4px;font-size:.88em;background:#fff}
.qitem{background:#fff;border:2px solid var(--bd);border-radius:7px;margin-bottom:8px;overflow:hidden}
.qask{padding:9px 11px;background:linear-gradient(90deg,rgba(139,58,58,.04),transparent);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:700;color:var(--p);font-size:.88em}
.qans{padding:12px;background:rgba(245,241,232,.4);border-top:1px solid var(--bd);display:none;line-height:1.8;font-size:.85em}
.qans.op{display:block}
.qtgl{transition:transform .3s;font-size:.95em;display:inline-block}
.qtgl.op{transform:rotate(180deg)}
.nf{text-align:center;padding:20px;color:#999}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.ac{background:#fff;border:2px solid var(--bd);border-radius:7px;padding:12px;text-align:center;transition:all .3s;position:relative;overflow:hidden}
.ac.lk{filter:grayscale(1);opacity:.5}
.ac.ul{border-color:var(--a);background:linear-gradient(180deg,rgba(212,175,55,.08),#fff)}
.ac.ul::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--a)}
.ai{font-size:1.8em;margin-bottom:4px}
.an{font-weight:700;color:var(--p);font-size:.85em;margin-bottom:3px}
.ad{font-size:.7em;color:#777}
.ac.ul .an{color:var(--a)}
.dc{background:linear-gradient(135deg,var(--p),#6B2A2A);color:#fff;border-radius:8px;padding:12px;margin-bottom:12px;text-align:center}
.dl{font-size:.75em;opacity:.75;margin-bottom:3px}
.dn{font-size:1.3em;font-weight:700;color:var(--a);margin-bottom:3px}
.dd{font-size:.8em;opacity:.85}
.dbt{background:var(--a);color:var(--p);border:none;border-radius:4px;padding:4px 12px;font-weight:700;cursor:pointer;margin-top:6px}
.srow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.sc{background:#fff;border:2px solid var(--bd);border-radius:7px;padding:10px;text-align:center}
.sn{font-size:1.3em;font-weight:700;color:var(--p)}
.sl{font-size:.75em;color:#777}
.info{background:#fff;border:2px solid var(--bd);border-radius:7px;padding:12px}
.infoh{font-weight:700;color:var(--p);margin-bottom:8px}
.infob{font-size:.82em;line-height:1.8;color:#555}
.infob strong{color:var(--p)}
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.5)}
.modal.op{display:flex;align-items:center;justify-content:center}
.mc{background:#fff;padding:18px;border-radius:7px;max-width:480px;max-height:80vh;overflow-y:auto;margin:15px;border-top:4px solid var(--p)}
.mcl{float:right;font-size:1.2em;cursor:pointer;color:var(--txt);padding:2px;line-height:1}
.mcl:hover{color:var(--p)}
.mt{color:var(--p);font-size:1.1em;margin-bottom:10px;border-bottom:1px solid var(--bd);padding-bottom:7px}
.mrow{margin-bottom:7px}
.mrow strong{color:var(--p)}
.sp{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fff;border:3px solid var(--a);border-radius:10px;padding:15px 25px;text-align:center;z-index:1001;transition:transform .3s}
.sp.sh{transform:translate(-50%,-50%) scale(1)}
.snum{font-size:1.8em;color:var(--a);font-weight:700}
.stx{color:var(--p);font-size:.85em}
.toast{position:fixed;bottom:15px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--p);color:#fff;padding:8px 16px;border-radius:6px;font-weight:700;z-index:1002;transition:transform .3s;box-shadow:0 3px 10px rgba(0,0,0,.25);font-size:.85em}
.toast.sh{transform:translateX(-50%) translateY(0)}
.toast.ach{background:linear-gradient(135deg,var(--a),#8B6914)}
@media(max-width:768px){.grid{grid-template-columns:1fr}.tabs{flex-direction:column}.tabs button{width:100%}.gbar{font-size:.72em}.si{padding:2px 5px}.ag{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}}
</style>
</head>
<body>

var levelNames = ['初学者', '学徒', '弟子', '医师', '名医', '国医', '圣手', '医仙', '医圣', '医神'];
var levelThresholds = [0, 100, 300, 600, 1000, 1500, 2200, 3000, 4000, 5000];

function loadGame() {
  try {
    var saved = localStorage.getItem('tcmGame');
    if (saved) {
      var parsed = JSON.parse(saved);
      gameState = {...gameState, ...parsed};
    }
  } catch(e) {}
  updateGameUI();
  checkAchievements();
}

function saveGame() {
  try {
    localStorage.setItem('tcmGame', JSON.stringify(gameState));
  } catch(e) {}
}

function addScore(pts, msg) {
  gameState.score += pts;
  updateGameUI();
  showScorePopup(pts);
  if (msg) showToast(msg);
  checkLevelUp();
  checkAchievements();
  saveGame();
}

function updateGameUI() {
  var el = document.getElementById('sD');
  if (el) el.textContent = gameState.score;
  var el2 = document.getElementById('lD');
  if (el2) el2.textContent = gameState.levelName;
  var el3 = document.getElementById('aC');
  if (el3) el3.textContent = Object.keys(gameState.achievements).length;
  var el4 = document.getElementById('qD');
  if (el4) el4.textContent = gameState.quizAnswered;
  var el5 = document.getElementById('hQC');
  if (el5) el5.textContent = gameState.quizAnswered;
  var acc = gameState.quizAnswered > 0 ? Math.round(gameState.quizCorrect/gameState.quizAnswered*100) : 0;
  var el6 = document.getElementById('hAcc');
  if (el6) el6.textContent = acc + '%';
  var el7 = document.getElementById('lP');
  if (el7) {
    var next = levelThresholds[gameState.level] || levelThresholds[levelThresholds.length-1];
    var curr = levelThresholds[gameState.level-1] || 0;
    var pct = Math.min(100, Math.round((gameState.score-curr)/(next-curr)*100));
    el7.style.width = pct + '%';
  }
}

function checkLevelUp() {
  for (var i = levelThresholds.length-1; i >= 0; i--) {
    if (gameState.score >= levelThresholds[i]) {
      if (gameState.level !== i+1) {
        gameState.level = i+1;
        gameState.levelName = levelNames[i] || levelNames[levelNames.length-1];
        showToast('🎉 恭喜升至：' + gameState.levelName + '！');
        checkAchievements('level_up');
      }
      break;
    }
  }
}

function checkAchievements(id) {
  if (id) {
    var ach = achievements.find(function(a){return a.id === id;});
    if (ach && !gameState.achievements[id] && ach.condition(gameState)) {
      gameState.achievements[id] = true;
      showToast('🏆 解锁成就：' + ach.icon + ' ' + ach.name + '！');
      renderAchievements();
      saveGame();
    }
  } else {
    var unlocked = 0;
    achievements.forEach(function(ach) {
      if (!gameState.achievements[ach.id] && ach.condition(gameState)) {
        gameState.achievements[ach.id] = true;
        showToast('🏆 解锁成就：' + ach.icon + ' ' + ach.name + '！');
        unlocked++;
      }
    });
    if (unlocked > 0) {
      renderAchievements();
      saveGame();
    }
  }
  updateGameUI();
}

function showScorePopup(pts) {
  var pop = document.getElementById('sPop');
  var num = document.getElementById('sPn');
  if (pop && num) {
    num.textContent = '+' + pts;
    pop.classList.add('sh');
    setTimeout(function(){pop.classList.remove('sh');}, 1000);
  }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  if (t) {
    t.textContent = msg;
    t.classList.add('sh');
    setTimeout(function(){t.classList.remove('sh');}, 3000);
  }
}

// ===================== TABS =====================
document.querySelectorAll('.tabs button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tabs button').forEach(function(b){b.classList.remove('active');});
    document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('active');});
    btn.classList.add('active');
    var tab = document.getElementById(btn.dataset.t);
    if (tab) tab.classList.add('active');
    if (btn.dataset.t === 'acupoints') { gameState.visitedAcupoints = true; checkAchievements('browse_acupoints'); }
    if (btn.dataset.t === 'medicines') { gameState.visitedHerbs = true; checkAchievements('browse_herbs'); }
    if (btn.dataset.t === 'qa') { gameState.visitedQA = true; checkAchievements('browse_qa'); }
    saveGame();
  });
});

// ===================== ACUPOINTS =====================
var activeMeridian = '';

function buildMeridianFilter() {
  var sel = document.getElementById('mS');
  var fil = document.getElementById('mF');
  if (!sel || !fil) return;
  Object.keys(acupointsFull).forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    sel.appendChild(opt);
    var btn = document.createElement('button');
    btn.className = 'mb';
    btn.textContent = m;
    btn.onclick = function() {
      activeMeridian = (activeMeridian === m) ? '' : m;
      document.querySelectorAll('.mb').forEach(function(b){b.classList.remove('active');});
      if (activeMeridian) btn.classList.add('active');
      sel.value = activeMeridian;
      renderAcupointsFlat();
    };
    fil.appendChild(btn);
  });
}

function renderAcupointsFlat() {
  var grid = document.getElementById('aG');
  if (!grid) return;
  grid.innerHTML = '';
  var pts = activeMeridian ? acupointsFull[activeMeridian] : Object.values(acupointsFull).flat();
  pts.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'card';
    var isFav = gameState.favorites.indexOf('acu_' + p.name) !== -1;
    card.innerHTML = '<button class="fn ' + (isFav?'hi':'') + '" onclick="toggleFav(event, \'acu_' + p.name + '\')">' + (isFav?'❤️':'🤍') + '</button><div class="cname">' + p.name + '</div><div class="cloc">' + p.location + '</div><div class="cdet"><strong>功效：</strong>' + p.effect + '</div><div class="cdet"><strong>主治：</strong>' + p.indication + '</div>';
    card.onclick = function(){showAcuModal(p);};
    grid.appendChild(card);
  });
  document.getElementById('aN').style.display = pts.length ? 'none' : 'block';
}

function searchAcupoints() {
  var kw = document.getElementById('aS').value.trim().toLowerCase();
  var m = document.getElementById('mS').value;
  activeMeridian = m;
  var grid = document.getElementById('aG');
  if (!grid) return;
  grid.innerHTML = '';
  var allPts = m ? acupointsFull[m] : Object.values(acupointsFull).flat();
  var pts = kw ? allPts.filter(function(p) {
    return p.name.toLowerCase().indexOf(kw) !== -1 || p.effect.toLowerCase().indexOf(kw) !== -1 || p.indication.toLowerCase().indexOf(kw) !== -1;
  }) : allPts;
  pts.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'card';
    var isFav = gameState.favorites.indexOf('acu_' + p.name) !== -1;
    card.innerHTML = '<button class="fn ' + (isFav?'hi':'') + '" onclick="toggleFav(event, \'acu_' + p.name + '\')">' + (isFav?'❤️':'🤍') + '</button><div class="cname">' + p.name + '</div><div class="cloc">' + p.location + '</div><div class="cdet"><strong>功效：</strong>' + p.effect + '</div>';
    card.onclick = function(){showAcuModal(p);};
    grid.appendChild(card);
  });
  document.getElementById('aN').style.display = pts.length ? 'none' : 'block';
}

function resetAcupoints() {
  document.getElementById('aS').value = '';
  document.getElementById('mS').value = '';
  activeMeridian = '';
  document.querySelectorAll('.mb').forEach(function(b){b.classList.remove('active');});
  renderAcupointsFlat();
}

function showAcuModal(p) {
  document.getElementById('mB').innerHTML = '<div class="modal-title">' + p.name + '</div><div class="modal-row"><strong>定位：</strong>' + p.location + '</div><div class="modal-row"><strong>功效：</strong>' + p.effect + '</div><div class="modal-row"><strong>主治：</strong>' + p.indication + '</div><div class="modal-row"><strong>下针手法：</strong>' + p.method + '</div>';
  document.getElementById('dMod').classList.add('open');
}

function toggleFav(e, id) {
  e.stopPropagation();
  var idx = gameState.favorites.indexOf(id);
  if (idx === -1) {
    gameState.favorites.push(id);
    showToast('❤️ 已收藏');
  } else {
    gameState.favorites.splice(idx, 1);
    showToast('已取消收藏');
  }
  saveGame();
  checkAchievements('favorite_3');
  if (document.getElementById('aG')) renderAcupointsFlat();
  if (document.getElementById('meG')) renderMedicines(herbsFull);
}

    card.className = 'card mrd';
    var isFav = gameState.favorites.indexOf('herb_' + h.name) !== -1;
    card.innerHTML = '<button class="fn ' + (isFav?'hi':'') + '" onclick="toggleFav(event, \'herb_' + h.name + '\')">' + (isFav?'❤️':'🤍') + '</button><div class="cname">' + h.name + '</div><div class="cpy">' + h.pinyin + ' | ' + h.category + '</div><div class="cdet"><strong>四气：</strong>' + h.nature + ' <strong>五味：</strong>' + h.taste + '</div><div class="cdet"><strong>功效：</strong>' + h.effect + '</div>';
    card.onclick = function(){showHerbModal(h);};
    grid.appendChild(card);
  });
  document.getElementById('meN').style.display = arr.length ? 'none' : 'block';
}

function searchMedicines() {
  var kw = document.getElementById('meS').value.trim().toLowerCase();
  var cat = document.getElementById('meC').value;
  var herbs = herbsFull.filter(function(h) {
    var ok = (!cat || h.category === cat);
    var kd = (!kw || h.name.toLowerCase().indexOf(kw) !== -1 || h.effect.toLowerCase().indexOf(kw) !== -1 || h.indication.toLowerCase().indexOf(kw) !== -1 || h.pinyin.toLowerCase().indexOf(kw) !== -1);
    return ok && kd;
  });
  renderMedicines(herbs);
}

function resetMedicines() {
  document.getElementById('meS').value = '';
  document.getElementById('meC').value = '';
  renderMedicines(herbsFull);
}

function showHerbModal(h) {
  document.getElementById('mB').innerHTML = '<div class="modal-title">' + h.name + ' <span style="font-size:0.6em;color:#888">' + h.pinyin + '</span></div><div class="modal-row"><strong>分类：</strong>' + h.category + '</div><div class="modal-row"><strong>四气：</strong>' + h.nature + ' <strong>五味：</strong>' + h.taste + '</div><div class="modal-row"><strong>归经：</strong>' + h.meridian + '</div><div class="modal-row"><strong>功效：</strong>' + h.effect + '</div><div class="modal-row"><strong>主治：</strong>' + h.indication + '</div><div class="modal-row"><strong>注意事项：</strong>' + h.caution + '</div>';
  document.getElementById('dMod').classList.add('open');
}

// ===================== QUIZ =====================
var currentQ = 0, quizTotal = 0, quizData = [], quizAnswered = 0, quizCorrect = 0, answered = false;

function initQuiz() {
  var shuffled = quizQuestions.slice().sort(function(){return 0.5-Math.random();});
  quizData = shuffled;
  quizTotal = shuffled.length;
  currentQ = 0; quizAnswered = 0; quizCorrect = 0; answered = false;
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizContent').style.display = 'block';
  document.getElementById('quizContent').style.visibility = 'visible';
  updateQuizUI();
  showQuestion();
}

function updateQuizUI() {
  var el = document.getElementById('qPr');
  if (el) { el.style.width = Math.round((currentQ/quizTotal)*100) + '%'; el.textContent = Math.round((currentQ/quizTotal)*100) + '%'; }
  var ael = document.getElementById('qAn');
  if (ael) ael.textContent = quizAnswered;
  var cel = document.getElementById('qCr');
  if (cel) cel.textContent = quizCorrect;
  var sel = document.getElementById('qSc');
  if (sel) sel.textContent = gameState.score;
}

function showQuestion() {
  if (currentQ >= quizTotal) { showResult(); return; }
  var q = quizData[currentQ];
  var pct = Math.round((currentQ/quizTotal)*100);
  var el = document.getElementById('qPr');
  if (el) { el.style.width = pct + '%'; el.textContent = pct + '%'; }
  var opts = q.options.map(function(o, i) {
    return '<label class="qopt"><input type="radio" name="qopt" value="' + i + '"> ' + o + '</label>';
  }).join('');
  document.getElementById('qC').innerHTML = '<div class="qh">第 ' + (currentQ+1) + '/' + quizTotal + ' 题：' + q.q + '</div><div class="qopts">' + opts + '</div>';
  answered = false;
}

function submitAnswer() {
  if (answered) {
    currentQ++;
    updateQuizUI();
    showQuestion();
    return;
  }
  var sel = document.querySelector('input[name="qopt"]:checked');
  if (!sel) { showToast('请选择一个答案！'); return; }
  answered = true;
  var idx = parseInt(sel.value);
  var q = quizData[currentQ];
  var isCorrect = idx === q.answer;
  document.querySelectorAll('.qopt').forEach(function(el, i) {
    if (i === q.answer) el.classList.add('ok');
    else if (i === idx && !isCorrect) el.classList.add('no');
  });
  quizAnswered++;
  if (isCorrect) {
    quizCorrect++;
    gameState.streak++;
    var bonus = (gameState.streak >= 3) ? 5 : 0;
    addScore(10 + bonus, bonus > 0 ? '🔥 连击+5' : null);
    checkAchievements('first_quiz');
    checkAchievements('quiz_10');
    checkAchievements('quiz_50');
    checkAchievements('quiz_100');
    checkAchievements('perfect_5');
    checkAchievements('perfect_10');
  } else {
    gameState.streak = 0;
  }
  var acc = quizAnswered > 0 ? Math.round(quizCorrect/quizAnswered*100) : 0;
  if (quizAnswered >= 10 && acc >= 80) checkAchievements('accuracy_80');
  if (quizAnswered >= 20 && quizCorrect === quizAnswered) checkAchievements('accuracy_100');
  gameState.quizAnswered = quizAnswered;
  gameState.quizCorrect = quizCorrect;
  gameState.lastPlayed = Date.now();
  saveGame();
  updateQuizUI();
}

function showResult() {
  var pct = Math.round((quizCorrect/quizTotal)*100);
  document.getElementById('qC').style.display = 'none';
  document.getElementById('qRes').style.display = 'block';
  document.getElementById('rS').textContent = quizCorrect + '/' + quizTotal + ' (' + pct + '%)';
  var msg = pct >= 90 ? '🎉 太棒了！中医大师！' : pct >= 70 ? '👍 很不错！继续加油！' : pct >= 50 ? '💪 还需努力，多复习！' : '📚 建议重新学习基础知识！';
  document.getElementById('rM2').textContent = msg;
}

function resetQuiz() { initQuiz(); }

// ===================== QA =====================
function buildQA() {
  var list = document.getElementById('qaL');
  if (!list) return;
  list.innerHTML = '';
  qaKnowledge.forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'qa-item';
    div.innerHTML = '<div class="qa-question" onclick="toggleQA(this)"><span>' + item.q + '</span><span class="qa-toggle">▼</span></div><div class="qa-answer">' + item.a + '</div>';
    list.appendChild(div);
  });
}

function toggleQA(el) {
  var ans = el.nextElementSibling;
  var toggle = el.querySelector('.qa-toggle');
  if (ans.classList.toggle('open')) toggle.classList.add('open'); else toggle.classList.remove('open');
}

function filterQA() {
  var kw = document.getElementById('qaSearchInput').value.trim().toLowerCase();
  document.querySelectorAll('.qa-item').forEach(function(item) {
    var q = item.querySelector('.qa-question span').textContent.toLowerCase();
    var a = item.querySelector('.qa-answer').textContent.toLowerCase();
    item.style.display = (!kw || q.indexOf(kw) !== -1 || a.indexOf(kw) !== -1) ? 'block' : 'none';
  });
}

// ===================== ACHIEVEMENTS =====================
function renderAchievements() {
  var grid = document.getElementById('achieveGrid');
  if (!grid) return;
  grid.innerHTML = '';
  achievements.forEach(function(ach) {
    var unlocked = gameState.achievements[ach.id];
    var card = document.createElement('div');
    card.className = 'ach-card ' + (unlocked ? 'unlocked' : 'locked');
    card.innerHTML = '<div class="ach-icon">' + ach.icon + '</div><div class="ach-name">' + ach.name + '</div><div class="ach-desc">' + (unlocked ? ach.desc : '???') + '</div>';
    if (unlocked) card.onclick = function() { showToast(ach.desc); };
    grid.appendChild(card);
  });
}

// ===================== DAILY PICK =====================
function setDaily() {
  var today = new Date().toDateString();
  var seed = today.split('').reduce(function(a,c){return a+c.charCodeAt(0);},0);
  var allItems = [];
  Object.keys(acupointsFull).forEach(function(m) {
    acupointsFull[m].forEach(function(p) {
      allItems.push({type:'acupoint', name:p.name, desc:p.effect, location:p.location});
    });
  });
  herbsFull.forEach(function(h) {
    allItems.push({type:'herb', name:h.name, desc:h.effect, pinyin:h.pinyin});
  });
  var item = allItems[seed % allItems.length];
  document.getElementById('dn').textContent = '✨ ' + item.name;
  document.getElementById('dd').textContent = item.desc + (item.location ? ' | ' + item.location : '');
}

function refreshDaily() {
  var allItems = [];
  Object.keys(acupointsFull).forEach(function(m) {
    acupointsFull[m].forEach(function(p) {
      allItems.push({type:'acupoint', name:p.name, desc:p.effect, location:p.location});
    });
  });
  herbsFull.forEach(function(h) {
    allItems.push({type:'herb', name:h.name, desc:h.effect, pinyin:h.pinyin});
  });
  var item = allItems[Math.floor(Math.random()*allItems.length)];
  document.getElementById('dn').textContent = '✨ ' + item.name;
  document.getElementById('dd').textContent = item.desc + (item.location ? ' | ' + item.location : '');
  showToast('换了一个推荐～');
}

function closeM() { document.getElementById('dMod').classList.remove('open'); }

// Short function aliases
function sA() { searchAcupoints(); }
function rA() { resetAcupoints(); }
function sM() { searchMedicines(); }
function rM() { resetMedicines(); }
function subQ() { submitAnswer(); }
function initQ() { initQuiz(); }
function fQA() { filterQA(); }
function refreshD() { refreshDaily(); }

// ===================== MODAL =====================
document.getElementById('dMod').addEventListener('click', function(e) {
  if (e.target === this) closeM();
});

// ===================== INIT =====================
loadGame();
buildMeridianFilter();
renderAcupointsFlat();
renderMedicines(herbsFull);
initQuiz();
buildQA();
renderAchievements();
setDaily();
</script>
